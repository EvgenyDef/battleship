<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <!-- Вот эта строка исправляет кодировку -->
    <meta charset="UTF-8">
    <title>Вход в игру</title>
</head>
<body>
<form th:action="@{/login}" method="post">
    <h2>Вход в игру</h2>
    <input type="text" name="nickname" placeholder="Введите никнейм" required>

    <!-- Скрытое поле пароля для Spring Security -->
    <input type="hidden" name="password" value="">

    <button type="submit">Войти</button>
    <p>Нет аккаунта? <a th:href="@{/register}">Регистрация</a></p>

    <div style="color: red" th:if="${param.error}">
        Неверный никнейм или ошибка входа
    </div>
</form>
</body>
</html>
